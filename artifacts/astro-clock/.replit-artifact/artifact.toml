kind = "mobile"
previewPath = "/"
title = "Astro Clock"
version = "1.0.0"
id = "artifacts/astro-clock"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20090

[services.development]
run = "pnpm --filter @workspace/astro-clock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astro-clock", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/astro-clock", "run", "serve" ]

[services.env]
PORT = "20090"
BASE_PATH = "/"
